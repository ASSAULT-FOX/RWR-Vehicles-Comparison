<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DLC载具查询器</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f0f6ff;
      --panel: rgba(255, 255, 255, 0.7);
      --panel-strong: rgba(255, 255, 255, 0.92);
      --line: rgba(93, 125, 159, 0.18);
      --text: #182838;
      --muted: #66788d;
      --accent: #12b7c8;
      --accent-2: #3f7cff;
      --accent-soft: rgba(63, 124, 255, 0.1);
      --good: #16a36b;
      --bad: #dc4d4d;
      --same: #7a8892;
      --shadow: 0 24px 70px rgba(35, 76, 124, 0.16);
      --soft-shadow: 0 12px 34px rgba(35, 76, 124, 0.1);
      --radius: 8px;
      font-family: "Microsoft YaHei UI", "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        linear-gradient(120deg, rgba(240, 250, 255, 0.96) 0%, rgba(245, 249, 255, 0.9) 42%, rgba(255, 248, 251, 0.72) 100%),
        linear-gradient(180deg, #fbfdff 0%, var(--bg) 100%);
      overflow: hidden;
    }

    button,
    select,
    input {
      font: inherit;
    }

    .shell {
      height: 100vh;
      display: grid;
      padding: 16px;
      grid-template-columns: minmax(0, 1fr);
    }

    .main {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      backdrop-filter: blur(24px) saturate(150%);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      overflow: hidden;
    }

    .topbar {
      min-height: 72px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(18px) saturate(150%);
    }

    h1 {
      margin: 0;
      font-size: 23px;
      line-height: 1.25;
      font-weight: 800;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .search {
      width: min(320px, 36vw);
      position: relative;
      flex: 0 1 320px;
    }

    .search input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      padding: 10px 12px 10px 36px;
      outline: 0;
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.88);
      transition: border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .search input:focus {
      border-color: rgba(63, 124, 255, 0.38);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(63, 124, 255, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.88);
    }

    .search span {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }

    .compare-bar {
      display: grid;
      grid-template-columns: auto auto auto auto auto;
      justify-content: start;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.62);
      backdrop-filter: blur(18px) saturate(150%);
    }

    .primary {
      border: 0;
      border-radius: 8px;
      padding: 0 18px;
      min-height: 42px;
      color: #fff;
      background: linear-gradient(135deg, #20c8d4, var(--accent-2));
      box-shadow: 0 12px 24px rgba(43, 122, 230, 0.22);
      cursor: pointer;
      font-weight: 700;
      white-space: nowrap;
      transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
    }

    .primary:hover:not(:disabled),
    .confirm:hover,
    .target-mode-button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 16px 30px rgba(43, 122, 230, 0.26);
    }

    .primary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
      background: #b9c2ca;
    }

    .primary.danger {
      background: linear-gradient(135deg, #e25555, #c92f52);
      box-shadow: 0 10px 24px rgba(201, 47, 82, 0.18);
    }

    .confirm {
      display: none;
      border: 0;
      border-radius: 8px;
      padding: 0 18px;
      min-height: 42px;
      color: #fff;
      background: linear-gradient(135deg, #25c685, #0c9f72);
      box-shadow: 0 12px 24px rgba(7, 158, 104, 0.18);
      cursor: pointer;
      font-weight: 800;
      white-space: nowrap;
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }

    .confirm.show {
      display: inline-flex;
      align-items: center;
    }

    .compare-hint {
      color: var(--muted);
      font-size: 13px;
    }

    .target-mode-button {
      margin-left: 34px;
      border: 0;
      border-radius: 8px;
      padding: 0 18px;
      min-height: 42px;
      color: #fff;
      background: linear-gradient(135deg, #20c8d4, var(--accent-2));
      box-shadow: 0 12px 24px rgba(43, 122, 230, 0.22);
      cursor: pointer;
      font-weight: 700;
      white-space: nowrap;
      transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
    }

    .target-mode-button.danger {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, #e25555, #c92f52);
    }

    .target-mode-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
      background: #b9c2ca;
    }

    .target-hint {
      color: var(--muted);
      font-size: 13px;
    }

    .table-wrap {
      min-height: 0;
      overflow: auto;
      background: rgba(255, 255, 255, 0.34);
    }

    table {
      width: 100%;
      min-width: 1380px;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 14px;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      text-align: center;
      color: #3d515d;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      padding: 12px 14px;
      white-space: nowrap;
    }

    thead th.sortable {
      cursor: pointer;
      user-select: none;
    }

    .sort-indicator {
      display: inline-grid;
      place-items: center;
      width: 18px;
      margin-left: 4px;
      color: var(--muted);
      font-size: 12px;
      vertical-align: 1px;
    }

    thead th.sorted .sort-indicator {
      color: var(--accent-2);
      font-weight: 900;
    }

    tbody td {
      padding: 13px 14px;
      border-bottom: 1px solid rgba(118, 140, 153, 0.16);
      vertical-align: middle;
      text-align: center;
    }

    tbody tr {
      background: rgba(255, 255, 255, 0.42);
      transition: background 0.16s ease, transform 0.16s ease, box-shadow 0.16s ease;
    }

    body:not(.compare-mode) tbody tr:hover {
      background: rgba(235, 248, 255, 0.86);
      box-shadow: inset 4px 0 0 var(--accent-2), inset 0 0 0 9999px rgba(63, 124, 255, 0.035);
      cursor: pointer;
    }

    body.target-mode tbody tr.no-target-weapon,
    body.target-mode tbody tr.no-target-weapon:hover {
      color: #8b99a4;
      background: rgba(226, 232, 237, 0.62);
      box-shadow: none;
      cursor: not-allowed;
      opacity: 0.58;
      transform: none;
    }

    body.compare-mode tbody tr {
      cursor: pointer;
    }

    body.compare-mode tbody tr.selected {
      position: relative;
      z-index: 2;
      background: rgba(222, 240, 255, 0.78);
      box-shadow: 0 10px 24px rgba(56, 169, 245, 0.18), inset 4px 0 0 #38a9f5;
      transform: scale(1.008);
    }

    .num {
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .faction {
      display: inline-flex;
      align-items: center;
      min-width: 48px;
      justify-content: center;
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 700;
      background: rgba(24, 164, 167, 0.12);
      color: #167d82;
    }

    tbody tr:nth-child(even) {
      background: rgba(250, 253, 255, 0.58);
    }

    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.34);
    }

    ::-webkit-scrollbar-thumb {
      border: 2px solid rgba(255, 255, 255, 0.72);
      border-radius: 999px;
      background: rgba(111, 135, 164, 0.36);
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(63, 124, 255, 0.42);
    }

    .faction.de {
      background: #ead7bd;
      color: #7a5126;
    }

    .faction.us {
      background: #d9ecff;
      color: #21669e;
    }

    .faction.jp {
      background: #ffe0df;
      color: #b0443f;
    }

    .faction.uk {
      background: rgba(24, 164, 167, 0.12);
      color: #167d82;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(30, 55, 86, 0.2);
      backdrop-filter: blur(16px) saturate(140%);
      z-index: 10;
    }

    .modal.open {
      display: grid;
    }

    .modal.open .dialog {
      animation: dialogIn 0.22s ease-out;
    }

    .dialog {
      width: min(1080px, 96vw);
      max-height: min(840px, 92vh);
      overflow: auto;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(26px) saturate(160%);
      box-shadow: 0 28px 90px rgba(21, 54, 94, 0.26);
      backface-visibility: hidden;
      transform: translateZ(0);
    }

    @keyframes dialogIn {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.985);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .dialog-head {
      position: sticky;
      top: 0;
      z-index: 2;
      padding: 16px 18px;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(18px) saturate(150%);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      transform: translateZ(0);
    }

    .dialog-head h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
    }

    .icon-button {
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      transition: background 0.16s ease, color 0.16s ease, transform 0.16s ease;
    }

    .icon-button:hover {
      color: var(--text);
      background: #fff;
      transform: translateY(-1px);
    }

    .compare-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px minmax(0, 1fr);
      gap: 12px;
      padding: 18px;
      align-items: stretch;
    }

    .vehicle-card,
    .metric-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.76);
      box-shadow: var(--soft-shadow);
      overflow: hidden;
    }

    .vehicle-card {
      padding: 16px;
    }

    .vehicle-head {
      min-height: 100px;
    }

    .vehicle-card h3 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.35;
    }

    .weapon {
      color: var(--muted);
      line-height: 1.45;
    }

    .metric-labels,
    .side-values {
      display: grid;
      grid-auto-rows: 58px;
      gap: 10px;
      margin-top: 16px;
    }

    .metric-labels {
      margin-top: 132px;
    }

    .metric-label,
    .side-value {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.68);
      align-items: center;
      min-width: 0;
      min-height: 58px;
    }

    .group-label,
    .group-spacer {
      min-height: 44px;
    }

    .group-label {
      display: grid;
      place-items: center;
      border: 1px solid rgba(79, 128, 255, 0.16);
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(230, 243, 255, 0.96), rgba(235, 249, 250, 0.92));
      color: #285c97;
      font-weight: 900;
      text-align: center;
    }

    .group-spacer {
      border: 1px solid transparent;
    }

    .metric-label {
      display: grid;
      place-items: center;
      color: var(--muted);
      font-weight: 800;
      text-align: center;
      padding: 0 10px;
      line-height: 1.25;
    }

    .metric-label .metric-title {
      color: var(--text);
    }

    .metric-label .metric-subtitle {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .side-value {
      display: grid;
      grid-template-columns: 1fr 34px;
      align-items: center;
      justify-content: stretch;
      gap: 12px;
      padding: 0 14px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      text-align: center;
    }

    .side-value.right {
      justify-content: stretch;
    }

    .side-value .value-text {
      min-width: 0;
      text-align: center;
      line-height: 1.25;
    }

    .side-value::before {
      content: "";
      display: none;
    }

    .metrics {
      display: grid;
      gap: 10px;
      padding: 0 18px 18px;
    }

    .metric-card {
      display: grid;
      grid-template-columns: minmax(120px, 1fr) 130px 54px 130px;
      align-items: center;
      min-height: 58px;
    }

    .metric-name {
      padding: 12px 14px;
      color: var(--muted);
      font-weight: 700;
    }

    .metric-value {
      padding: 12px 14px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      text-align: center;
      word-break: break-word;
    }

    .arrow {
      width: 34px;
      height: 34px;
      margin: auto;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-size: 20px;
      font-weight: 900;
      line-height: 1;
      background: rgba(122, 136, 146, 0.12);
      color: var(--same);
    }

    .arrow.up {
      color: var(--good);
      background: rgba(22, 163, 107, 0.12);
    }

    .arrow.down {
      color: var(--bad);
      background: rgba(220, 77, 77, 0.12);
    }

    .arrow.hidden {
      visibility: hidden;
    }

    .result-row {
      border-color: rgba(24, 164, 167, 0.24);
      background: rgba(235, 249, 249, 0.82);
    }

    .bad-word {
      color: var(--bad);
      font-size: 19px;
      letter-spacing: 0;
    }

    .detail-dialog {
      width: min(980px, 96vw);
    }

    .detail-hero {
      margin: 18px 18px 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.94), rgba(235, 249, 249, 0.9));
      box-shadow: var(--soft-shadow);
      text-align: center;
    }

    .detail-hero h3 {
      margin: 10px 0 0;
      font-size: 24px;
      line-height: 1.3;
    }

    .detail-rows {
      display: grid;
      gap: 12px;
      padding: 18px;
    }

    .detail-section {
      display: grid;
      gap: 10px;
    }

    .detail-section + .detail-section {
      margin-top: 16px;
    }

    .detail-section-title {
      min-height: 42px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(24, 164, 167, 0.14), rgba(79, 128, 255, 0.12));
      color: var(--text);
      font-weight: 900;
      letter-spacing: 0;
      border: 1px solid rgba(24, 164, 167, 0.18);
    }

    .detail-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      min-height: 54px;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.76);
      box-shadow: 0 8px 24px rgba(35, 76, 124, 0.06);
    }

    .detail-name,
    .detail-value {
      display: grid;
      place-items: center;
      padding: 10px 12px;
      text-align: center;
      line-height: 1.3;
    }

    .detail-name {
      color: var(--muted);
      font-weight: 800;
      background: rgba(246, 250, 255, 0.94);
      border-right: 1px solid var(--line);
    }

    .detail-value {
      font-weight: 850;
      font-variant-numeric: tabular-nums;
    }

    .target-dialog {
      width: min(1500px, calc(100vw - 48px));
      height: min(880px, calc(100vh - 48px));
      max-height: calc(100vh - 48px);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 18px;
      background: rgba(247, 251, 255, 0.86);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .target-layout {
      min-height: 0;
      display: grid;
      grid-template-columns: 7fr 3fr;
      gap: 18px;
      padding: 22px;
      min-width: 0;
      height: 100%;
    }

    .target-stage {
      position: relative;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 14px;
      background:
        linear-gradient(rgba(63, 124, 255, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(63, 124, 255, 0.045) 1px, transparent 1px),
        linear-gradient(135deg, rgba(255, 255, 255, 0.88), rgba(238, 248, 255, 0.72)),
        rgba(255, 255, 255, 0.84);
      background-size: 32px 32px;
      overflow: hidden;
      contain: layout paint;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9), var(--soft-shadow);
    }

    .tank-model {
      position: absolute;
      left: 50%;
      top: 50%;
      width: var(--tank-body-width, 116px);
      height: 62px;
      transform: translate(-50%, -50%);
      border-radius: 6px;
      background: linear-gradient(135deg, #6d8370, #4f6757);
      border: 0;
      box-shadow: 0 16px 34px rgba(33, 62, 47, 0.18);
      z-index: 4;
    }

    .tank-model::after {
      content: "";
      position: absolute;
      left: calc(100% - 24px);
      top: 25px;
      width: 82px;
      height: 12px;
      border-radius: 0 6px 6px 0;
      background: linear-gradient(135deg, #6d8370, #4f6757);
      box-shadow: none;
    }

    .tank-label {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 900;
      text-align: center;
      padding: 8px;
      font-size: 13px;
      line-height: 1.2;
      overflow: hidden;
      word-break: break-all;
      z-index: 1;
    }

    .threat-token {
      position: absolute;
      left: 0;
      top: 0;
      width: 54px;
      height: 54px;
      border: 2px solid rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 11px;
      font-weight: 900;
      text-align: center;
      line-height: 1.05;
      box-shadow: 0 10px 26px rgba(28, 59, 72, 0.16);
      cursor: grab;
      isolation: isolate;
      touch-action: none;
      user-select: none;
      z-index: 3;
      will-change: transform;
      backface-visibility: hidden;
      transition: box-shadow 0.16s ease, filter 0.16s ease;
    }

    .threat-token::before,
    .threat-token::after {
      content: "";
      position: absolute;
      pointer-events: none;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.16s ease, transform 0.16s ease;
    }

    .threat-token::before {
      inset: -4px;
      background: inherit;
      z-index: -1;
      filter: saturate(1.08);
    }

    .threat-token::after {
      inset: -9px;
      border: 3px solid rgba(229, 57, 53, 0.88);
      box-shadow: 0 0 0 5px rgba(229, 57, 53, 0.12);
      z-index: -2;
    }

    .threat-token.dragging {
      cursor: grabbing;
      transition: none;
    }

    .threat-token.top-threat {
      z-index: 4;
      filter: saturate(1.16);
      box-shadow: 0 14px 30px rgba(229, 57, 53, 0.18), 0 10px 26px rgba(28, 59, 72, 0.16);
    }

    .threat-token.top-threat::before,
    .threat-token.top-threat::after {
      opacity: 1;
    }

    .threat-token.top-threat::after {
      animation: topThreatRing 1.25s ease-in-out infinite;
    }

    @keyframes topThreatRing {
      0%,
      100% {
        transform: scale(0.96);
      }

      50% {
        transform: scale(1.08);
      }
    }

    .threat-token.dragging {
      z-index: 5;
    }

    .target-panel {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 14px;
    }

    .target-section {
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: var(--soft-shadow);
      overflow: hidden;
    }

    .target-section:last-child {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

      margin: 0;
      padding: 13px 14px;
      font-size: 15px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.74);
      backdrop-filter: blur(12px);
    }

    .threat-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px;
    }

    .threat-button {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: rgba(247, 251, 252, 0.8);
      color: var(--text);
      cursor: pointer;
      font-weight: 750;
      font-size: 13px;
      transition: transform 0.14s ease, border-color 0.14s ease, background 0.14s ease, box-shadow 0.14s ease;
    }

    .threat-button:hover {
      transform: translateY(-1px);
      border-color: rgba(63, 124, 255, 0.24);
      box-shadow: 0 8px 18px rgba(35, 76, 124, 0.08);
    }

    .threat-button.active {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
    }

    .priority-list {
      display: grid;
      gap: 8px;
      padding: 12px;
      align-content: start;
      min-height: 0;
      height: 100%;
      overflow: auto;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
      contain: layout paint;
    }

    .priority-item {
      position: relative;
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      min-height: 46px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(248, 252, 253, 0.88);
      transition: background 0.14s ease, box-shadow 0.14s ease, transform 0.14s ease;
    }

    .priority-item.top {
      background: linear-gradient(135deg, rgba(255, 245, 245, 0.98), rgba(239, 249, 255, 0.96));
      border-color: rgba(229, 57, 53, 0.22);
      box-shadow: 0 12px 26px rgba(229, 57, 53, 0.11);
      transform: translateY(-1px);
    }

    .priority-rank {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--accent);
      font-size: 12px;
      font-weight: 900;
    }

    .priority-name {
      font-weight: 850;
      min-width: 0;
    }

    .priority-score {
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      color: var(--accent-2);
    }

    .detail-row.at-row {
      grid-template-columns: minmax(0, 1.3fr) minmax(0, 0.85fr) minmax(0, 0.85fr);
      min-height: 68px;
    }

    .detail-row.at-row .detail-value {
      border-right: 1px solid var(--line);
    }

    .detail-percent {
      color: var(--good);
    }

    .detail-at-title {
      color: var(--text);
      font-weight: 900;
    }

    .detail-at-subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      padding: 10px 14px;
      border-radius: 8px;
      color: #fff;
      background: rgba(29, 43, 52, 0.88);
      box-shadow: var(--shadow);
      display: none;
      z-index: 20;
    }

    .toast.show {
      display: block;
    }

    @media (max-width: 860px) {
      body {
        overflow: auto;
      }

      .shell {
        min-height: 100vh;
        height: auto;
        grid-template-columns: 1fr;
        padding: 10px;
      }

      .main {
        min-height: calc(100vh - 20px);
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .search {
        width: 100%;
        flex-basis: auto;
      }

      .compare-bar {
        grid-template-columns: 1fr;
      }

      .primary {
        min-height: 44px;
      }

      .table-wrap {
        overflow: auto;
      }

      .compare-grid {
        grid-template-columns: 1fr;
      }

      .metric-labels {
        display: none;
      }

      .side-value,
      .side-value.right {
        grid-template-columns: minmax(92px, 1fr) minmax(80px, 1fr) 34px;
      }

      .side-value::before {
        content: attr(data-label);
        display: block;
        color: var(--muted);
        font-weight: 700;
        text-align: left;
        line-height: 1.25;
      }

      .metric-card {
        grid-template-columns: 1fr 88px 44px 88px;
      }
    }
  </style>
</head>

    const tankDestroyerThreats = [["",1,0,1,0.5],["heavy_armour",1,0,1,8],["medium_armour",1,0,1,6],["light_armour",1,0,1,5],["at_gun",1,0,1,5.5],["light_at_gun",1,0,1,4],["bazooka",1,0,1,3.5],["light_vehicle",1,0,1,2.5],["defensive_weapon",1,0,1,2]];
    const heavyCannonThreats = [["",1,0,1,0.5],["heavy_armour",1,0,1,10],["medium_armour",1,0,1,7],["light_armour",1,0,1,5.5],["at_gun",1,0,1,7.5],["light_at_gun",1,0,1,4],["bazooka",1,0,1,3.5],["light_vehicle",1,0,1,2.5],["defensive_weapon",1,0,1,2]];

    function factors(rows) {

    function fmt(value) {
      if (value === null || value === undefined) return "—";

    function getSortedList(list) {
      if (!sortState.key || !sortState.direction) return list.slice();
      const multiplier = sortState.direction === "desc" ? -1 : 1;
      return list.slice().sort((a, b) => {
        const left = a[sortState.key];
        const right = b[sortState.key];
        const leftMissing = left === null || left === undefined;
        const rightMissing = right === null || right === undefined;
        if (leftMissing && rightMissing) return vehicles.indexOf(a) - vehicles.indexOf(b);
        if (leftMissing) return 1;
        if (rightMissing) return -1;
        if (left === right) return vehicles.indexOf(a) - vehicles.indexOf(b);
        return (left - right) * multiplier;
      });
    }

    function updateSortHeaders() {
      document.querySelectorAll("th.sortable").forEach((header) => {
        const indicator = header.querySelector(".sort-indicator");

        header.classList.toggle("sorted", Boolean(active));
        indicator.textContent = active ? (sortState.direction === "desc" ? "↓" : "↑") : "";

    function compareArrow(left, right) {
      if (left > right) return { left: "↑", right: "↓", leftClass: "up", rightClass: "down" };
      if (left < right) return { left: "↓", right: "↑", leftClass: "down", rightClass: "up" };
      return { left: "=", right: "=", leftClass: "", rightClass: "" };
    }

    function compareArrowLowerBetter(left, right) {
      if (left < right) return { left: "↑", right: "↓", leftClass: "up", rightClass: "down" };
      if (left > right) return { left: "↓", right: "↑", leftClass: "down", rightClass: "up" };
      return { left: "=", right: "=", leftClass: "", rightClass: "" };
    }

    function compareArrowLowerWorse(left, right) {
      if (left < right) return { left: "↓", right: "↑", leftClass: "down", rightClass: "up" };
      if (left > right) return { left: "↑", right: "↓", leftClass: "up", rightClass: "down" };

      if (attacker.blast <= defender.threshold) {
        return { valid: false, label: '<span class="bad-word">太硬了</span>' };
      }

      const realDamage = attacker.blast - defender.reduction;
      if (realDamage <= 0) {
        return { valid: false, label: '<span class="bad-word">太硬了</span>' };
      }

      return {
        valid: true,
        realDamage,
        percent: (realDamage / defender.hp) * 100,
        shots: Math.ceil(defender.hp / realDamage)
      };
    }

    function weaponHitResult(blastDamage, defender) {
      if (blastDamage <= defender.threshold) {
        return { valid: false, label: '<span class="bad-word">太硬了</span>' };
      }

      const realDamage = blastDamage - defender.reduction;
      if (realDamage <= 0) {
        return { valid: false, label: '<span class="bad-word">太硬了</span>' };
      }

      return {
        valid: true,
        realDamage,
        percent: (realDamage / defender.hp) * 100,
        shots: Math.ceil(defender.hp / realDamage)
      };
    }

    function buildCompareRows(a, b, aHitsB, bHitsA) {
      const percentValue = (hit) => hit.valid ? hit.percent : -Infinity;
      const shotsValue = (hit) => hit.valid ? hit.shots : -Infinity;
      const reloadComparable = a.reload !== null && b.reload !== null;

      const rows = [

        { label: "炮塔转速", leftDisplay: fmt(a.turret), leftCompare: a.turret, rightDisplay: fmt(b.turret), rightCompare: b.turret, comparable: a.turret !== null && b.turret !== null },

          comparable: duelComparable
        },
        {

          leftDisplay: aHitsB.valid ? `${aHitsB.shots} 发` : '<span class="bad-word">太硬了</span>',
          leftCompare: shotsValue(aHitsB),
          rightDisplay: bHitsA.valid ? `${bHitsA.shots} 发` : '<span class="bad-word">太硬了</span>',

        },

      antiTankWeapons.forEach((weapon) => {
        const leftResult = weaponHitResult(weapon.blast, a);

        const comparable = leftResult.valid && rightResult.valid;
        rows.push({
          label: weapon.label,
          subtitle: "需射击多少发摧毁",
          leftDisplay: leftResult.valid ? String(leftResult.shots) : leftResult.label,
          leftCompare: leftResult.valid ? leftResult.shots : Infinity,
          rightDisplay: rightResult.valid ? String(rightResult.shots) : rightResult.label,
          rightCompare: rightResult.valid ? rightResult.shots : Infinity,

          lowerWorse: true

    function sideMetricRows(rows, side) {
      return rows.map((row) => {
        if (row.type === "group") {

        const comparable = row.comparable !== false;
        const arrow = comparable
          ? (row.lowerWorse ? compareArrowLowerWorse(row.leftCompare, row.rightCompare) : (row.lowerBetter ? compareArrowLowerBetter(row.leftCompare, row.rightCompare) : compareArrow(row.leftCompare, row.rightCompare)))
          : { left: "", right: "", leftClass: "hidden", rightClass: "hidden" };
        const symbol = comparable ? (side === "left" ? arrow.left : arrow.right) : "";
        const symbolClass = comparable ? (side === "left" ? arrow.leftClass : arrow.rightClass) : "hidden";
        const display = side === "left" ? row.leftDisplay : row.rightDisplay;
        return `
          <div class="side-value ${side}" data-label="${row.label}">
            <span class="value-text">${display}</span>
            <span class="arrow ${symbolClass}">${symbol}</span>

    function getThreatFactors(vehicle) {
      const weapon = vehicle.weapon || "";
      if (weapon === "—") return factors(mgThreats);
      if (weapon.includes("重机枪") || weapon.includes("机枪") || weapon.includes("喷火器")) return factors(mgThreats);
      if (weapon.includes("20mm") || weapon.includes("40mm") || weapon.includes("13mm")) return factors(autoCannonThreats);
      if (weapon.includes("无后坐力")) return factors(recoillessThreats);
      if (weapon.includes("88mm") || weapon.includes("128mm")) return factors(heavyCannonThreats);
      if (weapon.includes("17磅") || weapon.includes("3英寸") || vehicle.name.includes("狼獾") || vehicle.name.includes("TOG")) return factors(tankDestroyerThreats);
      if (weapon.includes("37mm") || weapon.includes("57mm")) return factors(lightCannonThreats);
      return factors(mediumCannonThreats);
    }

    function toggleThreat(tag) {
      if (activeThreats.has(tag)) {
        activeThreats.get(tag).el.remove();

        targetStage.appendChild(el);

        activeThreats.set(tag, item);
        placeThreat(item, pos.x, pos.y);
      }
      syncThreatButtons();
      scheduleThreatScores();

    function syncThreatButtons() {
      threatButtons.querySelectorAll(".threat-button").forEach((button) => {

    function tankRectInStage() {
      const stageRect = targetStage.getBoundingClientRect();
      const tankRect = targetTank.getBoundingClientRect();
      return { left: tankRect.left - stageRect.left, top: tankRect.top - stageRect.top, right: tankRect.right - stageRect.left, bottom: tankRect.bottom - stageRect.top };
    }

    function barrelRectInStage() {
      const tank = tankRectInStage();
      const bodyWidth = targetTank.getBoundingClientRect().width;
      return {
        left: tank.left + bodyWidth - 24,
        top: tank.top + 25,
        right: tank.left + bodyWidth + 58,
        bottom: tank.top + 37
      };
    }

    function blockedTankRectInStage() {
      const tank = tankRectInStage();
      const barrel = barrelRectInStage();
      return {
        left: Math.min(tank.left, barrel.left),
        top: Math.min(tank.top, barrel.top),
        right: Math.max(tank.right, barrel.right),
        bottom: Math.max(tank.bottom, barrel.bottom)
      };
    }

    function overlapsRect(x, y, size, rect) {
      return x < rect.right && x + size > rect.left && y < rect.bottom && y + size > rect.top;
    }

    function overlapsTank(x, y, size = 54) {
      return overlapsRect(x, y, size, tankRectInStage()) || overlapsRect(x, y, size, barrelRectInStage());
    }

    function overlapsThreats(x, y, size = 54, ignoredItem = null) {
      const gap = 8;
      const centerX = x + size / 2;
      const centerY = y + size / 2;
      return Array.from(activeThreats.values()).some((item) => {
        if (item === ignoredItem) return false;
        const otherCenterX = item.x + size / 2;
        const otherCenterY = item.y + size / 2;
        return Math.hypot(centerX - otherCenterX, centerY - otherCenterY) < size + gap;
      });
    }

    function isThreatPositionClear(x, y, size, item) {
      return !overlapsTank(x, y, size) && !overlapsThreats(x, y, size, item);
    }

    function placeThreat(item, x, y) {
      const stageRect = targetStage.getBoundingClientRect();
      const size = 54;
      const padding = 8;
      const step = size + 8;
      const clampX = (value) => Math.max(padding, Math.min(value, stageRect.width - size - padding));
      const clampY = (value) => Math.max(padding, Math.min(value, stageRect.height - size - padding));
      const baseX = clampX(x);
      const baseY = clampY(y);
      let nextX = baseX;
      let nextY = baseY;

      if (!isThreatPositionClear(nextX, nextY, size, item)) {
        const tank = blockedTankRectInStage();
        const centerX = baseX + size / 2;
        const centerY = baseY + size / 2;
        const candidates = [
          { x: centerX < (tank.left + tank.right) / 2 ? tank.left - size - 10 : tank.right + 10, y: baseY },
          { x: baseX, y: centerY < (tank.top + tank.bottom) / 2 ? tank.top - size - 10 : tank.bottom + 10 },
          { x: tank.left - size - 10, y: tank.top - size - 10 },
          { x: tank.left - size - 10, y: tank.bottom + 10 },
          { x: tank.right + 10, y: tank.top - size - 10 },
          { x: tank.right + 10, y: tank.bottom + 10 }
        ];

        activeThreats.forEach((other) => {
          if (other === item) return;
          candidates.push(
            { x: other.x - step, y: other.y },
            { x: other.x + step, y: other.y },
            { x: other.x, y: other.y - step },
            { x: other.x, y: other.y + step },
            { x: other.x - step, y: other.y - step },
            { x: other.x + step, y: other.y - step },
            { x: other.x - step, y: other.y + step },
            { x: other.x + step, y: other.y + step }
          );
        });

        for (let ring = 1; ring <= 8; ring += 1) {
          const radius = ring * step;
          for (let dx = -radius; dx <= radius; dx += step) {
            candidates.push({ x: baseX + dx, y: baseY - radius });
            candidates.push({ x: baseX + dx, y: baseY + radius });
          }
          for (let dy = -radius + step; dy <= radius - step; dy += step) {
            candidates.push({ x: baseX - radius, y: baseY + dy });
            candidates.push({ x: baseX + radius, y: baseY + dy });
          }
        }

        const clearCandidate = candidates
          .map((candidate) => ({ x: clampX(candidate.x), y: clampY(candidate.y) }))
          .filter((candidate, index, list) => list.findIndex((item) => item.x === candidate.x && item.y === candidate.y) === index)
          .filter((candidate) => isThreatPositionClear(candidate.x, candidate.y, size, item))
          .sort((a, b) => Math.hypot(a.x - baseX, a.y - baseY) - Math.hypot(b.x - baseX, b.y - baseY))[0];

        if (clearCandidate) {
          nextX = clearCandidate.x;
          nextY = clearCandidate.y;
        } else if (isThreatPositionClear(item.x, item.y, size, item)) {
          nextX = item.x;
          nextY = item.y;
        }
      }
      item.x = nextX;
      item.y = nextY;
      item.el.style.transform = `translate3d(${nextX}px, ${nextY}px, 0)`;
    }

    function threatScore(item) {
      const stageRect = targetStage.getBoundingClientRect();
      const barrel = barrelRectInStage();
      const barrelBase = { x: barrel.left, y: (barrel.top + barrel.bottom) / 2 };
      const barrelTip = { x: barrel.right, y: (barrel.top + barrel.bottom) / 2 };
      const threatCenter = { x: item.x + 27, y: item.y + 27 };
      const distance = Math.hypot(threatCenter.x - barrelTip.x, threatCenter.y - barrelTip.y);
      const maxDistance = Math.max(
        Math.hypot(barrelTip.x, barrelTip.y),
        Math.hypot(stageRect.width - barrelTip.x, barrelTip.y),
        Math.hypot(barrelTip.x, stageRect.height - barrelTip.y),
        Math.hypot(stageRect.width - barrelTip.x, stageRect.height - barrelTip.y)
      ) || 1;
      const distanceFactor = Math.max(0, 1 - distance / maxDistance);
      const barrelVector = { x: barrelTip.x - barrelBase.x, y: barrelTip.y - barrelBase.y };
      const targetVector = { x: threatCenter.x - barrelBase.x, y: threatCenter.y - barrelBase.y };
      const barrelLength = Math.hypot(barrelVector.x, barrelVector.y) || 1;
      const targetLength = Math.hypot(targetVector.x, targetVector.y) || 1;
      const directionFactor = Math.max(0, (barrelVector.x * targetVector.x + barrelVector.y * targetVector.y) / (barrelLength * targetLength));
      return item.factor.baseScore
        + item.factor.distance * distanceFactor
        + item.factor.direction * directionFactor
        + item.factor.squadCommand * 0;
    }

    function updateThreatScores() {
      const items = Array.from(activeThreats.values());
      items.forEach((item) => item.score = threatScore(item));
      items.sort((a, b) => b.score - a.score);
      const topTag = items[0]?.tag || null;
      activeThreats.forEach((item) => item.el.classList.toggle("top-threat", item.tag === topTag));
      renderPriorityList(items, topTag, true);
    }

    function scheduleThreatScores() {
      pendingScoreUpdate = true;
      if (scoreFrame) return;
      scoreFrame = window.requestAnimationFrame(() => {
        scoreFrame = null;
        if (!pendingScoreUpdate) return;
        pendingScoreUpdate = false;
        updateThreatScores();
      });
    }

    function renderPriorityList(items, topTag, allowReorder = true) {
      items.forEach((item, index) => {
        let node = Array.from(priorityList.querySelectorAll(".priority-item")).find((itemNode) => itemNode.dataset.tag === item.tag);
        if (!node) {
          node = document.createElement("div");
          node.className = "priority-item";
          node.dataset.tag = item.tag;
          node.innerHTML = `
            <div class="priority-rank"></div>
            <div class="priority-name"></div>
            <div class="priority-score"></div>
          `;
        }

        node.classList.toggle("top", item.tag === topTag);
        node.querySelector(".priority-name").textContent = threatNames[item.tag] || item.tag;
        node.querySelector(".priority-score").textContent = fmt(item.score);
        if (allowReorder && priorityList.children[index] !== node) {
          priorityList.insertBefore(node, priorityList.children[index] || null);
        } else if (!node.parentNode) {
          priorityList.appendChild(node);
        }
      });

      priorityList.querySelectorAll(".priority-item").forEach((node) => {
        if (!activeThreats.has(node.dataset.tag)) node.remove();
      });

      Array.from(priorityList.children).forEach((node, index) => {
        node.querySelector(".priority-rank").textContent = index + 1;
      });
    }

    function openComparison(indexA, indexB) {
      if (indexA === undefined || indexB === undefined) {
        showToast("需要先选择两个载具");
        return;
      }

      if (indexA === indexB) {
        showToast("请选择两个不同的载具");
        return;
      }

      const a = vehicles[indexA];
      const b = vehicles[indexB];
      const aHitsB = hitResult(a, b);
      const bHitsA = hitResult(b, a);
      const rows = buildCompareRows(a, b, aHitsB, bHitsA);

      compareCards.innerHTML = `
        <section class="vehicle-card">
          <div class="vehicle-head">
            ${factionBadge(a)}
            <h3>${a.name}</h3>
            <div class="weapon">${a.weapon}</div>
          </div>
          <div class="side-values">${sideMetricRows(rows, "left")}</div>
        </section>
        <section class="metric-labels">${metricLabels(rows)}</section>
        <section class="vehicle-card">
          <div class="vehicle-head">
            ${factionBadge(b)}
            <h3>${b.name}</h3>
            <div class="weapon">${b.weapon}</div>
          </div>
          <div class="side-values">${sideMetricRows(rows, "right")}</div>
        </section>
      `;

      compareMetrics.innerHTML = "";

      document.getElementById("compareTitle").textContent = `斗 兽 棋 结 果`;
      modal.classList.add("open");
      modal.querySelector(".dialog").scrollTop = 0;
    }

    searchInput.addEventListener("input", () => {
      applyView();
    });

    document.querySelectorAll("th.sortable").forEach((header) => {
      header.addEventListener("click", () => {
        const key = header.dataset.sort;
        if (sortState.key !== key) {
          sortState = { key, direction: "desc" };
        } else if (sortState.direction === "desc") {
          sortState.direction = "asc";
        } else {
          sortState = { key: null, direction: null };
        }
        applyView();
      });
    });

    compareBtn.addEventListener("click", () => setCompareMode(!compareMode));
    targetModeBtn.addEventListener("click", () => setTargetMode(!targetMode));
    confirmCompareBtn.addEventListener("click", () => {
      if (selectedIndices.length !== 2) {
        showToast("需要点选两个载具");
        return;
      }
      openComparison(selectedIndices[0], selectedIndices[1]);
      setCompareMode(false);
    });
    rowsEl.addEventListener("click", (event) => {
      const row = event.target.closest("tr[data-index]");
      if (!row) return;
      const index = Number(row.dataset.index);
      if (compareMode) {
        toggleRowSelection(index);
        return;
      }
      if (targetMode) {
        if (isUnarmedVehicle(vehicles[index])) {
          showToast("该载具没有武器，无法查看索敌优先级");
          return;
        }
        openTargetOptimizer(index);
        return;
      }
      openDetail(index);
    });
    threatButtons.addEventListener("click", (event) => {
      const button = event.target.closest(".threat-button");
      if (!button) return;
      toggleThreat(button.dataset.tag);
    });
    targetStage.addEventListener("pointerdown", (event) => {
      const token = event.target.closest(".threat-token");
      if (!token) return;
      const item = activeThreats.get(token.dataset.tag);
      if (!item) return;
      const rect = token.getBoundingClientRect();
      dragThreat = { item, offsetX: event.clientX - rect.left, offsetY: event.clientY - rect.top };
      token.classList.add("dragging");
      token.setPointerCapture(event.pointerId);
    });
    targetStage.addEventListener("pointermove", (event) => {
      if (!dragThreat) return;
      event.preventDefault();
      const stageRect = targetStage.getBoundingClientRect();
      placeThreat(dragThreat.item, event.clientX - stageRect.left - dragThreat.offsetX, event.clientY - stageRect.top - dragThreat.offsetY);
      scheduleThreatScores();
    });
    targetStage.addEventListener("pointerup", (event) => {
      if (!dragThreat) return;
      dragThreat.item.el.classList.remove("dragging");
      dragThreat = null;
      updateThreatScores();
    });
    targetStage.addEventListener("pointercancel", () => {
      if (dragThreat) dragThreat.item.el.classList.remove("dragging");
      dragThreat = null;
      updateThreatScores();
    });
    closeModal.addEventListener("click", () => modal.classList.remove("open"));
    modal.addEventListener("click", (event) => {
      if (event.target === modal) modal.classList.remove("open");
    });
    closeDetailModal.addEventListener("click", () => detailModal.classList.remove("open"));
    detailModal.addEventListener("click", (event) => {
      if (event.target === detailModal) detailModal.classList.remove("open");
    });
    closeTargetModal.addEventListener("click", () => targetModal.classList.remove("open"));
    targetModal.addEventListener("click", (event) => {
      if (event.target === targetModal) targetModal.classList.remove("open");
    });
    window.addEventListener("resize", () => {
      activeThreats.forEach((item) => placeThreat(item, item.x, item.y));
      if (targetModal.classList.contains("open")) updateThreatScores();
    });
    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        modal.classList.remove("open");
        detailModal.classList.remove("open");
        targetModal.classList.remove("open");
      }
    });

    applyView();
  </script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DLC参数查询器</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f0f6ff;
      --panel: rgba(255, 255, 255, 0.7);
      --panel-strong: rgba(255, 255, 255, 0.92);
      --line: rgba(93, 125, 159, 0.18);
      --text: #182838;
      --muted: #66788d;
      --accent: #12b7c8;
      --accent-2: #3f7cff;
      --accent-soft: rgba(63, 124, 255, 0.1);
      --good: #16a36b;
      --bad: #dc4d4d;
      --same: #7a8892;
      --shadow: 0 24px 70px rgba(35, 76, 124, 0.16);
      --soft-shadow: 0 12px 34px rgba(35, 76, 124, 0.1);
      --radius: 8px;
      font-family: "Microsoft YaHei UI", "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        linear-gradient(120deg, rgba(240, 250, 255, 0.96) 0%, rgba(245, 249, 255, 0.9) 42%, rgba(255, 248, 251, 0.72) 100%),
        linear-gradient(180deg, #fbfdff 0%, var(--bg) 100%);
      overflow: hidden;
    }

    button,
    select,
    input {
      font: inherit;
    }

    .shell {
      height: 100vh;
      display: grid;
      padding: 18px;
      grid-template-columns: minmax(0, 1fr);
    }

    .main {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      backdrop-filter: blur(24px) saturate(150%);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      overflow: hidden;
    }

    .topbar {
      min-height: 72px;
      padding: 16px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(18px) saturate(150%);
    }

    .tag-tabs {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px;
      border: 1px solid rgba(93, 125, 159, 0.16);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.68);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.84), 0 10px 26px rgba(35, 76, 124, 0.08);
    }

    .tag-tab {
      border: 0;
      border-radius: 8px;
      min-height: 38px;
      padding: 0 18px;
      color: #52677a;
      background: transparent;
      cursor: pointer;
      font-weight: 850;
      white-space: nowrap;
      transition: color 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
    }

    .tag-tab.active {
      color: #fff;
      background: linear-gradient(135deg, #20c8d4, var(--accent-2));
      box-shadow: 0 10px 22px rgba(43, 122, 230, 0.2);
    }

    .hidden {
      display: none !important;
    }

    .search {
      width: min(320px, 36vw);
      position: relative;
      flex: 0 1 320px;
    }

    .search input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      padding: 10px 12px 10px 36px;
      outline: 0;
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.88);
      transition: border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .search input:focus {
      border-color: rgba(63, 124, 255, 0.38);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(63, 124, 255, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.88);
    }

    .search span {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }

    .compare-bar {
      display: grid;
      grid-template-columns: auto auto auto auto auto;
      justify-content: start;
      align-items: center;
      gap: 10px;
      padding: 12px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.62);
      backdrop-filter: blur(18px) saturate(150%);
    }

    .primary {
      border: 0;
      border-radius: 8px;
      padding: 0 18px;
      min-height: 42px;
      color: #fff;
      background: linear-gradient(135deg, #20c8d4, var(--accent-2));
      box-shadow: 0 12px 24px rgba(43, 122, 230, 0.22);
      cursor: pointer;
      font-weight: 700;
      white-space: nowrap;
      transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
    }

    .primary:hover:not(:disabled),
    .confirm:hover,
    .target-mode-button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 16px 30px rgba(43, 122, 230, 0.26);
    }

    .primary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
      background: #b9c2ca;
    }

    .primary.danger {
      background: linear-gradient(135deg, #e25555, #c92f52);
      box-shadow: 0 10px 24px rgba(201, 47, 82, 0.18);
    }

    .confirm {
      display: none;
      border: 0;
      border-radius: 8px;
      padding: 0 18px;
      min-height: 42px;
      color: #fff;
      background: linear-gradient(135deg, #25c685, #0c9f72);
      box-shadow: 0 12px 24px rgba(7, 158, 104, 0.18);
      cursor: pointer;
      font-weight: 800;
      white-space: nowrap;
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }

    .confirm.show {
      display: inline-flex;
      align-items: center;
    }

    .compare-hint {
      min-width: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .target-mode-button {
      margin-left: 44px;
      border: 0;
      border-radius: 8px;
      width: max-content;
      max-width: 180px;
      padding: 0 16px;
      min-height: 42px;
      color: #fff;
      background: linear-gradient(135deg, #20c8d4, var(--accent-2));
      box-shadow: 0 12px 24px rgba(43, 122, 230, 0.22);
      cursor: pointer;
      font-weight: 700;
      white-space: nowrap;
      transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
    }

    .target-mode-button.danger {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, #e25555, #c92f52);
    }

    .target-mode-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
      background: #b9c2ca;
    }

    .target-hint {
      min-width: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .table-wrap {
      min-height: 0;
      overflow-x: hidden;
      overflow-y: auto;
      background: rgba(255, 255, 255, 0.34);
      padding-bottom: 76px;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
    }

    table {
      width: 100%;
      min-width: 0;
      table-layout: fixed;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13px;
    }

    col.faction-col {
      width: 5%;
    }

    col.name-col {
      width: 12%;
    }

    col.short-col {
      width: 7%;
    }

    col.medium-col {
      width: 8%;
    }

    col.weapon-col {
      width: 15%;
    }

    col.vision-col {
      width: 10%;
    }

    col.blast-col {
      width: 7%;
    }

    col.weapon-faction-col {
      width: 8%;
    }

    col.weapon-type-col {
      width: 10%;
    }

    col.weapon-name-col {
      width: 24%;
    }

    col.weapon-stat-col {
      width: 11%;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 8;
      color: #3d515d;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      padding: 0 8px;
      height: 58px;
      line-height: 1.22;
      white-space: normal;
      overflow-wrap: anywhere;
      text-align: center;
      vertical-align: middle;
    }

    thead th,
    tbody td {
      text-align: center;
    }

    thead th {
      align-content: center;
    }

    thead th.sortable {
      cursor: pointer;
      user-select: none;
      white-space: normal;
      border-radius: 8px;
      transition: background 0.16s ease, color 0.16s ease, box-shadow 0.16s ease;
    }

    .sort-indicator {
      display: none;
      place-items: center;
      width: 18px;
      height: 18px;
      margin-left: 5px;
      color: currentColor;
      font-size: 12px;
      line-height: 1;
      vertical-align: middle;
    }

    thead th.sorted {
      color: #fff;
      font-weight: 900;
      border-bottom-color: transparent;
    }

    thead th.sorted.advantage-sort {
      background: linear-gradient(135deg, #25c685, #0c9f72);
      box-shadow: inset 0 0 0 1px rgba(12, 159, 114, 0.18), 0 8px 18px rgba(7, 158, 104, 0.18);
    }

    thead th.sorted.disadvantage-sort {
      background: linear-gradient(135deg, #e25555, #c92f52);
      box-shadow: inset 0 0 0 1px rgba(201, 47, 82, 0.18), 0 8px 18px rgba(201, 47, 82, 0.16);
    }

    thead th.sorted .sort-indicator {
      display: none;
    }

    tbody td {
      position: relative;
      padding: 12px 8px;
      border-bottom: 1px solid rgba(118, 140, 153, 0.16);
      vertical-align: middle;
      text-align: center;
      line-height: 1.28;
      overflow-wrap: anywhere;
      word-break: break-word;
      transition: background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease, font-size 0.18s ease, font-weight 0.18s ease;
    }

    tbody tr {
      position: relative;
      background: rgba(255, 255, 255, 0.42);
      transform-origin: center;
      transition: background 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
    }

    tbody tr:nth-child(even) {
      background: rgba(250, 253, 255, 0.58);
    }

    body:not(.compare-mode) tbody tr:hover {
      z-index: 4;
      background: rgba(206, 245, 221, 0.7);
      box-shadow:
        inset 4px 0 0 rgba(32, 182, 108, 0.92),
        inset 0 0 0 9999px rgba(206, 245, 221, 0.18),
        0 12px 26px rgba(24, 126, 82, 0.12);
      cursor: pointer;
      filter: saturate(1.08);
    }

    body:not(.compare-mode) tbody tr:hover td {
      background: rgba(206, 245, 221, 0.28);
      font-size: 14px;
      font-weight: 850;
    }

    body.target-mode tbody tr.no-target-weapon,
    body.target-mode tbody tr.no-target-weapon:hover {
      color: #8b99a4;
      background: rgba(226, 232, 237, 0.62);
      box-shadow: none;
      cursor: not-allowed;
      opacity: 0.58;
      transform: none;
      filter: none;
      backdrop-filter: none;
    }

    body.target-mode tbody tr.no-target-weapon:hover td {
      font-size: 13px;
      font-weight: inherit;
      line-height: 1.28;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
    }

    body.compare-mode tbody tr {
      cursor: pointer;
    }

    body.compare-mode tbody tr.selected {
      position: relative;
      z-index: 4;
      background: rgba(206, 245, 221, 0.7);
      box-shadow:
        inset 4px 0 0 rgba(32, 182, 108, 0.92),
        inset 0 0 0 9999px rgba(206, 245, 221, 0.18),
        0 12px 26px rgba(24, 126, 82, 0.12);
      filter: saturate(1.08);
    }

    body.compare-mode tbody tr.selected td {
      background: rgba(206, 245, 221, 0.28);
      font-size: 14px;
      font-weight: 850;
    }

    .num {
      font-variant-numeric: tabular-nums;
      white-space: normal;
    }

    .faction {
      display: inline-flex;
      align-items: center;
      min-width: 64px;
      justify-content: center;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 14px;
      line-height: 1.1;
      font-weight: 850;
      background: rgba(24, 164, 167, 0.12);
      color: #167d82;
      white-space: nowrap;
    }

    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.34);
    }

    ::-webkit-scrollbar-thumb {
      border: 2px solid rgba(255, 255, 255, 0.72);
      border-radius: 999px;
      background: rgba(111, 135, 164, 0.36);
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(63, 124, 255, 0.42);
    }

    .faction.de {
      background: #ead7bd;
      color: #7a5126;
    }

    .faction.us {
      background: #d9ecff;
      color: #21669e;
    }

    .faction.jp {
      background: #ffe0df;
      color: #b0443f;
    }

    .faction.uk {
      background: rgba(24, 164, 167, 0.12);
      color: #167d82;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(30, 55, 86, 0.2);
      backdrop-filter: blur(16px) saturate(140%);
      z-index: 10;
    }

    .modal.open {
      display: grid;
    }

    .modal.open .dialog {
      animation: dialogIn 0.22s ease-out;
    }

    .dialog {
      width: min(1080px, 96vw);
      max-height: min(840px, 92vh);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(26px) saturate(160%);
      box-shadow: 0 28px 90px rgba(21, 54, 94, 0.26);
      backface-visibility: hidden;
      transform: translateZ(0);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    @keyframes dialogIn {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.985);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .dialog-head {
      z-index: 2;
      padding: 16px 18px;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(18px) saturate(150%);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      transform: translateZ(0);
    }

    .dialog-body {
      min-height: 0;
      overflow: auto;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
    }

    .dialog-head h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
    }

    .icon-button {
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      transition: background 0.16s ease, color 0.16s ease, transform 0.16s ease;
    }

    .icon-button:hover {
      color: var(--text);
      background: #fff;
      transform: translateY(-1px);
    }

    .compare-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px minmax(0, 1fr);
      gap: 12px;
      padding: 18px;
      align-items: stretch;
    }

    .vehicle-card,
    .metric-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.76);
      box-shadow: var(--soft-shadow);
      overflow: hidden;
    }

    .vehicle-card {
      padding: 16px;
    }

    .vehicle-head {
      height: 100px;
      min-height: 100px;
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 8px;
      text-align: center;
      overflow: hidden;
    }

    .vehicle-card h3 {
      margin: 2px 0 0;
      font-size: 20px;
      line-height: 1.35;
      font-weight: 900;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .weapon {
      color: var(--muted);
      line-height: 1.45;
      font-weight: 700;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .metric-labels,
    .side-values {
      display: grid;
      grid-auto-rows: 58px;
      gap: 10px;
      margin-top: 16px;
    }

    .metric-labels {
      margin-top: 132px;
    }

    .metric-label,
    .side-value {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.68);
      align-items: center;
      min-width: 0;
      min-height: 58px;
    }

    .group-label,
    .group-spacer {
      min-height: 44px;
    }

    .group-label {
      display: grid;
      place-items: center;
      border: 1px solid rgba(79, 128, 255, 0.16);
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(230, 243, 255, 0.96), rgba(235, 249, 250, 0.92));
      color: #285c97;
      font-weight: 900;
      text-align: center;
    }

    .group-spacer {
      border: 1px solid transparent;
    }

    .metric-label {
      display: grid;
      place-items: center;
      color: var(--muted);
      font-weight: 800;
      text-align: center;
      padding: 0 10px;
      line-height: 1.25;
    }

    .metric-label .metric-title {
      color: var(--text);
    }

    .metric-label .metric-subtitle {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .side-value {
      display: grid;
      grid-template-columns: 1fr 34px;
      align-items: center;
      justify-content: stretch;
      gap: 12px;
      padding: 0 14px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      text-align: center;
    }

    .side-value.right {
      justify-content: stretch;
    }

    .side-value .value-text {
      min-width: 0;
      text-align: center;
      line-height: 1.25;
    }

    .side-value::before {
      content: "";
      display: none;
    }

    .metrics {
      display: grid;
      gap: 10px;
      padding: 0 18px 18px;
    }

    .metric-card {
      display: grid;
      grid-template-columns: minmax(120px, 1fr) 130px 54px 130px;
      align-items: center;
      min-height: 58px;
    }

    .metric-name {
      padding: 12px 14px;
      color: var(--muted);
      font-weight: 700;
    }

    .metric-value {
      padding: 12px 14px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      text-align: center;
      word-break: break-word;
    }

    .arrow {
      width: 34px;
      height: 34px;
      margin: auto;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-size: 20px;
      font-weight: 900;
      line-height: 1;
      background: rgba(122, 136, 146, 0.12);
      color: var(--same);
    }

    .arrow.up {
      color: var(--good);
      background: rgba(22, 163, 107, 0.12);
    }

    .arrow.down {
      color: var(--bad);
      background: rgba(220, 77, 77, 0.12);
    }

    .arrow.hidden {
      visibility: hidden;
    }

    .result-row {
      border-color: rgba(24, 164, 167, 0.24);
      background: rgba(235, 249, 249, 0.82);
    }

    .bad-word {
      color: var(--bad);
      font-size: 19px;
      letter-spacing: 0;
    }

    .detail-dialog {
      width: min(980px, 96vw);
    }

    .detail-hero {
      margin: 18px 18px 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.94), rgba(235, 249, 249, 0.9));
      box-shadow: var(--soft-shadow);
      text-align: center;
      display: grid;
      justify-items: center;
      gap: 10px;
    }

    .detail-hero h3 {
      margin: 0;
      font-size: 24px;
      line-height: 1.3;
    }

    .detail-rows {
      display: grid;
      gap: 12px;
      padding: 18px;
    }

    .detail-section {
      display: grid;
      gap: 10px;
    }

    .detail-section + .detail-section {
      margin-top: 16px;
    }

    .detail-section-title {
      min-height: 42px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(24, 164, 167, 0.14), rgba(79, 128, 255, 0.12));
      color: var(--text);
      font-weight: 900;
      letter-spacing: 0;
      border: 1px solid rgba(24, 164, 167, 0.18);
    }

    .detail-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      min-height: 54px;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.76);
      box-shadow: 0 8px 24px rgba(35, 76, 124, 0.06);
    }

    .detail-name,
    .detail-value {
      display: grid;
      place-items: center;
      padding: 10px 12px;
      text-align: center;
      line-height: 1.3;
    }

    .detail-name {
      color: var(--muted);
      font-weight: 800;
      background: rgba(246, 250, 255, 0.94);
      border-right: 1px solid var(--line);
    }

    .detail-value {
      font-weight: 850;
      font-variant-numeric: tabular-nums;
    }

    .target-dialog {
      width: min(1500px, calc(100vw - 48px));
      height: min(880px, calc(100vh - 48px));
      max-height: calc(100vh - 48px);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 18px;
      background: rgba(247, 251, 255, 0.86);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .target-dialog .dialog-head {
      min-width: 0;
      flex: 0 0 auto;
    }

    .target-dialog .dialog-body {
      overflow: hidden;
    }

    .target-layout {
      min-height: 0;
      display: grid;
      grid-template-columns: 7fr 3fr;
      gap: 18px;
      padding: 22px;
      min-width: 0;
      height: 100%;
    }

    .target-stage {
      position: relative;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #ffffff;
      overflow: hidden;
      contain: layout paint;
      box-shadow: var(--soft-shadow);
    }

    .tank-model {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 198px;
      height: 62px;
      transform: translate(-50%, -50%);
      background: transparent;
      border: 0;
      filter: drop-shadow(0 16px 34px rgba(33, 62, 47, 0.18));
      z-index: 4;
    }

    .tank-model::before,
    .tank-model::after {
      content: "";
      position: absolute;
      background: #5f735f;
    }

    .tank-model::before {
      left: 0;
      top: 0;
      width: 116px;
      height: 62px;
      border-radius: 6px;
    }

    .tank-model::after {
      left: 92px;
      top: 25px;
      width: 82px;
      height: 12px;
      border-radius: 0 6px 6px 0;
    }

    .tank-label {
      display: none;
    }

    .threat-token {
      position: absolute;
      left: 0;
      top: 0;
      width: 54px;
      height: 54px;
      border: 2px solid rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 11px;
      font-weight: 900;
      text-align: center;
      line-height: 1.05;
      box-shadow: 0 10px 26px rgba(28, 59, 72, 0.16);
      cursor: grab;
      isolation: isolate;
      touch-action: none;
      user-select: none;
      z-index: 3;
      will-change: transform;
      backface-visibility: hidden;
      transition: box-shadow 0.16s ease, filter 0.16s ease;
    }

    .threat-token::before,
    .threat-token::after {
      content: "";
      position: absolute;
      pointer-events: none;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.16s ease, transform 0.16s ease;
    }

    .threat-token::before {
      inset: -4px;
      background: inherit;
      z-index: -1;
      filter: saturate(1.08);
    }

    .threat-token::after {
      left: 50%;
      top: 50%;
      width: 62px;
      height: 62px;
      border: 2px solid rgba(229, 57, 53, 0.86);
      box-shadow: 0 0 0 3px rgba(229, 57, 53, 0.1);
      transform: translate(-50%, -50%) scale(1);
      transform-origin: center;
      z-index: -2;
    }

    .threat-token.dragging {
      cursor: grabbing;
      transition: none;
    }

    .threat-token.top-threat {
      z-index: 4;
      filter: saturate(1.16);
      box-shadow: 0 14px 30px rgba(229, 57, 53, 0.18), 0 10px 26px rgba(28, 59, 72, 0.16);
    }

    .threat-token.top-threat::before,
    .threat-token.top-threat::after {
      opacity: 1;
    }

    .threat-token.top-threat::after {
      animation: topThreatRing 1.25s ease-in-out infinite;
    }

    @keyframes topThreatRing {
      0%,
      100% {
        transform: translate(-50%, -50%) scale(0.98);
      }

      50% {
        transform: translate(-50%, -50%) scale(1.04);
      }
    }

    .threat-token.dragging {
      z-index: 5;
    }

    .target-panel {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 14px;
    }

    .target-section {
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: var(--soft-shadow);
      overflow: hidden;
    }

    .target-section:last-child {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .target-section h3 {
      margin: 0;
      padding: 13px 14px;
      font-size: 15px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.74);
      backdrop-filter: blur(12px);
    }

    .threat-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px;
    }

    .threat-button {
      border: 0;
      border-radius: 8px;
      padding: 8px 10px;
      background: #a4afb8;
      color: #fff;
      cursor: pointer;
      font-weight: 750;
      font-size: 13px;
      box-shadow: 0 8px 18px rgba(77, 91, 104, 0.12);
      transition: transform 0.14s ease, background 0.14s ease, box-shadow 0.14s ease, filter 0.14s ease;
    }

    .threat-button:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
      box-shadow: 0 10px 20px rgba(77, 91, 104, 0.16);
    }

    .threat-button.active {
      color: #fff;
      background: linear-gradient(135deg, #17b978, #079e68);
      box-shadow: 0 10px 24px rgba(7, 158, 104, 0.2);
    }

    .priority-list {
      display: grid;
      gap: 8px;
      padding: 12px;
      align-content: start;
      min-height: 0;
      height: 100%;
      overflow: auto;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
      contain: layout paint;
    }

    .priority-item {
      position: relative;
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      min-height: 46px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(248, 252, 253, 0.88);
      transition: background 0.14s ease, box-shadow 0.14s ease, border-color 0.14s ease;
    }

    .priority-item.top {
      background: rgba(255, 255, 255, 0.98);
      border-color: rgba(229, 57, 53, 0.9);
      box-shadow: inset 0 0 0 1px rgba(229, 57, 53, 0.9), 0 10px 22px rgba(229, 57, 53, 0.1);
      animation: priorityPulse 1.25s ease-in-out infinite;
    }

    .priority-item.rank-moving {
      z-index: 3;
      box-shadow: 0 18px 32px rgba(20, 45, 58, 0.18);
    }

    @keyframes priorityPulse {
      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.035);
      }
    }

    .priority-rank {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--accent);
      font-size: 12px;
      font-weight: 900;
    }

    .priority-name {
      font-weight: 850;
      min-width: 0;
    }

    .priority-score {
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      color: var(--accent-2);
    }

    .detail-row.at-row {
      grid-template-columns: minmax(0, 1.3fr) minmax(0, 0.85fr) minmax(0, 0.85fr);
      min-height: 68px;
    }

    .detail-row.at-row .detail-value {
      border-right: 1px solid var(--line);
    }

    .detail-percent {
      color: var(--good);
    }

    .detail-at-title {
      color: var(--text);
      font-weight: 900;
    }

    .detail-at-subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      padding: 10px 14px;
      border-radius: 8px;
      color: #fff;
      background: rgba(29, 43, 52, 0.88);
      box-shadow: var(--shadow);
      display: none;
      z-index: 20;
    }

    .toast.show {
      display: block;
    }

    @media (max-width: 860px) {
      body {
        overflow: auto;
      }

      .shell {
        min-height: 100vh;
        height: auto;
        grid-template-columns: 1fr;
        padding: 10px;
      }

      .main {
        min-height: calc(100vh - 20px);
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .search {
        width: 100%;
        flex-basis: auto;
      }

      .compare-bar {
        grid-template-columns: 1fr;
      }

      .primary {
        min-height: 44px;
      }

      .table-wrap {
        overflow-x: hidden;
        overflow-y: auto;
      }

    .compare-grid {
      grid-template-columns: 1fr;
    }

      .tag-tabs {
        width: 100%;
      }

      .tag-tab {
        flex: 1;
      }

      .metric-labels {
        display: none;
      }

      .side-value,
      .side-value.right {
        grid-template-columns: minmax(92px, 1fr) minmax(80px, 1fr) 34px;
      }

      .side-value::before {
        content: attr(data-label);
        display: block;
        color: var(--muted);
        font-weight: 700;
        text-align: left;
        line-height: 1.25;
      }

      .metric-card {
        grid-template-columns: 1fr 88px 44px 88px;
      }
    }
  </style>
</head>

    function numericValue(value) {
      if (value === null || value === undefined) return null;
      const text = String(value).trim();
      if (!text || text === "/" || text === "—") return null;
      if (/^-?\d+(\.\d+)?\s*\*\s*-?\d+(\.\d+)?$/.test(text)) {
        return text.split("*").map(Number).reduce((total, item) => total * item, 1);
      }
      const match = text.replace(/x$/i, "").match(/-?\d+(\.\d+)?/);
      return match ? Number(match[0]) : null;
    }

    function getSortedList(list) {

      const higherBetter = vehicleHigherBetter.has(sortState.key);
      const multiplier = sortState.mode === "advantage"
        ? (higherBetter ? -1 : 1)
        : (higherBetter ? 1 : -1);
      return list.slice().sort((a, b) => {
        const left = a[sortState.key];
        const right = b[sortState.key];
        const leftMissing = left === null || left === undefined;
        const rightMissing = right === null || right === undefined;
        if (leftMissing && rightMissing) return vehicles.indexOf(a) - vehicles.indexOf(b);
        if (leftMissing) return 1;
        if (rightMissing) return -1;
        if (left === right) return vehicles.indexOf(a) - vehicles.indexOf(b);
        return (left - right) * multiplier;
      });
    }

      return {

    function tankRectInStage() {
      const stageRect = targetStage.getBoundingClientRect();
      const tankRect = targetTank.getBoundingClientRect();
      return { left: tankRect.left - stageRect.left, top: tankRect.top - stageRect.top, right: tankRect.right - stageRect.left, bottom: tankRect.bottom - stageRect.top };
    }

    function barrelRectInStage() {
      const tank = tankRectInStage();
      return {
        left: tank.left + 92,
        top: tank.top + 25,
        right: tank.left + 174,
        bottom: tank.top + 37
      };
    }

    function blockedTankRectInStage() {
      const tank = tankRectInStage();
      const barrel = barrelRectInStage();
      return {
        left: Math.min(tank.left, barrel.left),
        top: Math.min(tank.top, barrel.top),
        right: Math.max(tank.right, barrel.right),
        bottom: Math.max(tank.bottom, barrel.bottom)
      };
    }

    function overlapsRect(x, y, size, rect) {
      return x < rect.right && x + size > rect.left && y < rect.bottom && y + size > rect.top;
    }

    function overlapsTank(x, y, size = 54) {
      return overlapsRect(x, y, size, tankRectInStage());
    }

    function overlapsThreats(x, y, size = 54, ignoredItem = null) {
      const gap = 8;
      const centerX = x + size / 2;
      const centerY = y + size / 2;
      return Array.from(activeThreats.values()).some((item) => {
        if (item === ignoredItem) return false;
        const otherCenterX = item.x + size / 2;
        const otherCenterY = item.y + size / 2;
        return Math.hypot(centerX - otherCenterX, centerY - otherCenterY) < size + gap;
      });
    }

    function isThreatPositionClear(x, y, size, item) {
      return !overlapsTank(x, y, size) && !overlapsThreats(x, y, size, item);
    }

    function placeThreat(item, x, y) {
      const stageRect = targetStage.getBoundingClientRect();
      const size = 54;
      const padding = 8;
      const step = size + 8;
      const clampX = (value) => Math.max(padding, Math.min(value, stageRect.width - size - padding));
      const clampY = (value) => Math.max(padding, Math.min(value, stageRect.height - size - padding));
      const baseX = clampX(x);
      const baseY = clampY(y);
      let nextX = baseX;
      let nextY = baseY;

      if (!isThreatPositionClear(nextX, nextY, size, item)) {
        const tank = blockedTankRectInStage();
        const centerX = baseX + size / 2;
        const centerY = baseY + size / 2;
        const candidates = [
          { x: centerX < (tank.left + tank.right) / 2 ? tank.left - size - 10 : tank.right + 10, y: baseY },
          { x: baseX, y: centerY < (tank.top + tank.bottom) / 2 ? tank.top - size - 10 : tank.bottom + 10 },
          { x: tank.left - size - 10, y: tank.top - size - 10 },
          { x: tank.left - size - 10, y: tank.bottom + 10 },
          { x: tank.right + 10, y: tank.top - size - 10 },
          { x: tank.right + 10, y: tank.bottom + 10 }
        ];

        activeThreats.forEach((other) => {
          if (other === item) return;
          candidates.push(
            { x: other.x - step, y: other.y },
            { x: other.x + step, y: other.y },
            { x: other.x, y: other.y - step },
            { x: other.x, y: other.y + step },
            { x: other.x - step, y: other.y - step },
            { x: other.x + step, y: other.y - step },
            { x: other.x - step, y: other.y + step },
            { x: other.x + step, y: other.y + step }
          );
        });

        for (let ring = 1; ring <= 8; ring += 1) {
          const radius = ring * step;
          for (let dx = -radius; dx <= radius; dx += step) {
            candidates.push({ x: baseX + dx, y: baseY - radius });
            candidates.push({ x: baseX + dx, y: baseY + radius });
          }
          for (let dy = -radius + step; dy <= radius - step; dy += step) {
            candidates.push({ x: baseX - radius, y: baseY + dy });
            candidates.push({ x: baseX + radius, y: baseY + dy });
          }
        }

        const clearCandidate = candidates
          .map((candidate) => ({ x: clampX(candidate.x), y: clampY(candidate.y) }))
          .filter((candidate, index, list) => list.findIndex((item) => item.x === candidate.x && item.y === candidate.y) === index)
          .filter((candidate) => isThreatPositionClear(candidate.x, candidate.y, size, item))
          .sort((a, b) => Math.hypot(a.x - baseX, a.y - baseY) - Math.hypot(b.x - baseX, b.y - baseY))[0];

        if (clearCandidate) {
          nextX = clearCandidate.x;
          nextY = clearCandidate.y;
        } else if (isThreatPositionClear(item.x, item.y, size, item)) {
          nextX = item.x;
          nextY = item.y;
        }
      }
      item.x = nextX;
      item.y = nextY;
      item.el.style.transform = `translate3d(${nextX}px, ${nextY}px, 0)`;
    }

    function threatScore(item) {
      const stageRect = targetStage.getBoundingClientRect();
      const barrel = barrelRectInStage();
      const barrelBase = { x: barrel.left, y: (barrel.top + barrel.bottom) / 2 };
      const barrelTip = { x: barrel.right, y: (barrel.top + barrel.bottom) / 2 };
      const threatCenter = { x: item.x + 27, y: item.y + 27 };
      const distance = Math.hypot(threatCenter.x - barrelTip.x, threatCenter.y - barrelTip.y);
      const maxDistance = Math.max(
        Math.hypot(barrelTip.x, barrelTip.y),
        Math.hypot(stageRect.width - barrelTip.x, barrelTip.y),
        Math.hypot(barrelTip.x, stageRect.height - barrelTip.y),
        Math.hypot(stageRect.width - barrelTip.x, stageRect.height - barrelTip.y)
      ) || 1;
      const distanceFactor = Math.max(0, 1 - distance / maxDistance);
      const barrelVector = { x: barrelTip.x - barrelBase.x, y: barrelTip.y - barrelBase.y };
      const targetVector = { x: threatCenter.x - barrelTip.x, y: threatCenter.y - barrelTip.y };
      const barrelLength = Math.hypot(barrelVector.x, barrelVector.y) || 1;
      const targetLength = Math.hypot(targetVector.x, targetVector.y) || 1;
      const directionFactor = Math.max(0, (barrelVector.x * targetVector.x + barrelVector.y * targetVector.y) / (barrelLength * targetLength));
      return item.factor.baseScore
        + item.factor.distance * distanceFactor
        + item.factor.direction * directionFactor;
    }

    function updateThreatScores() {
      const items = Array.from(activeThreats.values());
      items.forEach((item) => item.score = threatScore(item));
      items.sort((a, b) => b.score - a.score);
      const topTag = items.length ? items[0].tag : null;
      activeThreats.forEach((item) => item.el.classList.toggle("top-threat", item.tag === topTag));
      renderPriorityList(items, topTag, true);
    }

    function scheduleThreatScores() {
      pendingScoreUpdate = true;
      if (scoreFrame) return;
      scoreFrame = window.requestAnimationFrame(() => {
        scoreFrame = null;
        if (!pendingScoreUpdate) return;
        pendingScoreUpdate = false;
        updateThreatScores();
      });
    }

    function renderPriorityList(items, topTag, allowReorder = true) {
      const firstRects = new Map();
      const previousRanks = new Map();
      if (allowReorder) {
        Array.from(priorityList.children).forEach((node, index) => {
          firstRects.set(node.dataset.tag, node.getBoundingClientRect());
          previousRanks.set(node.dataset.tag, index);
        });
      }

      items.forEach((item, index) => {
        let node = Array.from(priorityList.querySelectorAll(".priority-item")).find((itemNode) => itemNode.dataset.tag === item.tag);
        if (!node) {
          node = document.createElement("div");
          node.className = "priority-item";
          node.dataset.tag = item.tag;
          node.innerHTML = `
            <div class="priority-rank"></div>
            <div class="priority-name"></div>

          `;
        }

        node.classList.toggle("top", item.tag === topTag);
        node.querySelector(".priority-name").textContent = threatNames[item.tag] || item.tag;
        node.querySelector(".priority-score").textContent = fmt(item.score);
        if (allowReorder && priorityList.children[index] !== node) {
          priorityList.insertBefore(node, priorityList.children[index] || null);
        } else if (!node.parentNode) {
          priorityList.appendChild(node);
        }
      });

      priorityList.querySelectorAll(".priority-item").forEach((node) => {
        if (!activeThreats.has(node.dataset.tag)) node.remove();
      });

      Array.from(priorityList.children).forEach((node, index) => {
        node.querySelector(".priority-rank").textContent = index + 1;
      });

      if (!allowReorder) return;

      Array.from(priorityList.children).forEach((node, index) => {
        const firstRect = firstRects.get(node.dataset.tag);
        if (!firstRect || previousRanks.get(node.dataset.tag) === index) return;

        const lastRect = node.getBoundingClientRect();
        const deltaX = firstRect.left - lastRect.left;
        const deltaY = firstRect.top - lastRect.top;
        node.classList.add("rank-moving");
        node.style.transition = "none";
        node.style.transform = `translate(${deltaX}px, ${deltaY}px) scale(1)`;

        window.requestAnimationFrame(() => {
          node.style.transition = "transform 0.12s ease-out";
          node.style.transform = `translate(${deltaX}px, ${deltaY}px) scale(1.1)`;
          window.setTimeout(() => {
            node.style.transition = "transform 0.34s cubic-bezier(0.18, 0.9, 0.22, 1)";
            node.style.transform = "";
            window.setTimeout(() => {
              node.classList.remove("rank-moving");
              node.style.transition = "";
            }, 360);
          }, 120);
        });
      });
    }

      let comparable = leftValue !== null && rightValue !== null;

      let rightCompare = comparable ? rightValue : 0;

      if (key === "致死" && leftExplosive !== rightExplosive) {

        comparable = false;
        leftCompare = 0;
        rightCompare = 0;

        leftDisplay: weaponFieldDisplay(a, key),

        comparable,
        lowerBetter: !weaponHigherBetter.has(key)

      button.addEventListener("click", () => setActiveTab(button.dataset.tab));
    });

    document.querySelectorAll("th.sortable").forEach((header) => {
      header.addEventListener("click", () => {
        const key = header.dataset.sort;
        const isWeaponSort = header.classList.contains("weapon-sort");
        const state = isWeaponSort ? weaponSortState : sortState;
        let nextState;
        if (state.key !== key) {
          nextState = { key, mode: "advantage" };
        } else if (state.mode === "advantage") {
          nextState = { key, mode: "disadvantage" };
        } else {
          nextState = { key: null, mode: null };
        }
        if (isWeaponSort) {
          weaponSortState = nextState;
        } else {
          sortState = nextState;
        }
        applyView();
      });
    });

    compareBtn.addEventListener("click", () => setCompareMode(!compareMode));
    targetModeBtn.addEventListener("click", () => setTargetMode(!targetMode));
    confirmCompareBtn.addEventListener("click", () => {
      if (activeTab === "weapons") {
        if (selectedWeaponIndices.length !== 2) {
          showToast("需要点选两个枪械");
          return;
        }
        openWeaponComparison(selectedWeaponIndices[0], selectedWeaponIndices[1]);
        setCompareMode(false);
        return;
      }

      if (selectedIndices.length !== 2) {
        showToast("需要点选两个载具");
        return;
      }
      openComparison(selectedIndices[0], selectedIndices[1]);
      setCompareMode(false);
    });
    rowsEl.addEventListener("click", (event) => {
      const row = event.target.closest("tr[data-index]");
      if (!row) return;
      const index = Number(row.dataset.index);
      if (compareMode) {
        toggleRowSelection(index);
        return;
      }
      if (targetMode) {
        if (isUnarmedVehicle(vehicles[index])) {
          showToast("该载具没有武器，无法查看索敌优先级");
          return;
        }
        openTargetOptimizer(index);
        return;
      }
      openDetail(index);
    });
    weaponRowsEl.addEventListener("click", (event) => {
      const row = event.target.closest("tr[data-index]");
      if (!row) return;
      const index = Number(row.dataset.index);
      if (compareMode) {
        toggleRowSelection(index);
        return;
      }
      openWeaponDetail(index);
    });
    threatButtons.addEventListener("click", (event) => {
      const button = event.target.closest(".threat-button");
      if (!button) return;
      toggleThreat(button.dataset.tag);
    });
    targetStage.addEventListener("pointerdown", (event) => {
      const token = event.target.closest(".threat-token");
      if (!token) return;
      const item = activeThreats.get(token.dataset.tag);
      if (!item) return;
      const rect = token.getBoundingClientRect();
      dragThreat = { item, offsetX: event.clientX - rect.left, offsetY: event.clientY - rect.top };
      token.classList.add("dragging");
      token.setPointerCapture(event.pointerId);
    });
    targetStage.addEventListener("pointermove", (event) => {
      if (!dragThreat) return;
      event.preventDefault();
      const stageRect = targetStage.getBoundingClientRect();
      placeThreat(dragThreat.item, event.clientX - stageRect.left - dragThreat.offsetX, event.clientY - stageRect.top - dragThreat.offsetY);
      scheduleThreatScores();
    });
    targetStage.addEventListener("pointerup", (event) => {
      if (!dragThreat) return;
      dragThreat.item.el.classList.remove("dragging");
      dragThreat = null;
      updateThreatScores();
    });
    targetStage.addEventListener("pointercancel", () => {
      if (dragThreat) dragThreat.item.el.classList.remove("dragging");
      dragThreat = null;
      updateThreatScores();
    });
    closeModal.addEventListener("click", () => modal.classList.remove("open"));
    modal.addEventListener("click", (event) => {
      if (event.target === modal) modal.classList.remove("open");
    });
    closeDetailModal.addEventListener("click", () => detailModal.classList.remove("open"));
    detailModal.addEventListener("click", (event) => {
      if (event.target === detailModal) detailModal.classList.remove("open");
    });
    closeTargetModal.addEventListener("click", () => targetModal.classList.remove("open"));
    targetModal.addEventListener("click", (event) => {
      if (event.target === targetModal) targetModal.classList.remove("open");
    });
    window.addEventListener("resize", () => {
      activeThreats.forEach((item) => placeThreat(item, item.x, item.y));
      if (targetModal.classList.contains("open")) updateThreatScores();
    });
    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        modal.classList.remove("open");
        detailModal.classList.remove("open");
        targetModal.classList.remove("open");
      }
    });

    applyView();
  </script>
</body>
</html>
